services:
  mongodb:
    image: mongo:latest
    container_name: deho-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - deho-network

  api:
    build: ./API
    container_name: deho-api
    ports:
      - "4405:4405"
    env_file:
      - ./API/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/deho
      - PORT=4405
    depends_on:
      - mongodb
    networks:
      - deho-network



  admin:
    build: ./admin
    container_name: deho-admin
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - deho-network

  site:
    build: ./site
    container_name: deho-site
    ports:
      - "62044:80"
    depends_on:
      - api
    networks:
      - deho-network

networks:
  deho-network:
    driver: bridge

volumes:
  mongodb_data:
