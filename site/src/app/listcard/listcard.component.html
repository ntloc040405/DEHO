<section class="products-section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">{{ title }}</h2>
      <a routerLink="/sanpham" class="view-all-btn">
        Xem tất cả
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

    <div class="product-grid">
      <div class="product-card" *ngFor="let product of data">
        <!-- Badges -->
        <div class="card-badges">
          <span class="badge badge-sale" *ngIf="isSaleProduct(product)">
            -{{ calculateDiscountPercentage(product.price, product.salePrice!) }}%
          </span>
          <span class="badge badge-new" *ngIf="isNewProduct(product.createdAt) && !isSaleProduct(product)">NEW</span>
          <span class="badge badge-hot" *ngIf="title === 'Sản phẩm hot'">🔥 HOT</span>
        </div>

        <!-- Image -->
        <a [routerLink]="['/chitiet', product._id]" class="card-image-link">
          <div class="card-image">
            <img [src]="'http://localhost:4405' + product.thumbnail" [alt]="product.name" loading="lazy" />
            <div class="card-overlay">
              <button class="overlay-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                Xem nhanh
              </button>
            </div>
          </div>
        </a>

        <!-- Info -->
        <div class="card-info">
          <p class="card-category" *ngIf="product.categoryId">{{ product.categoryId.name }}</p>
          <a [routerLink]="['/chitiet', product._id]" class="card-name">{{ product.name }}</a>
          <div class="card-price-row">
            <div class="card-prices">
              <span class="price-current">
                {{ isSaleProduct(product) ? (product.salePrice | number:'1.0-0') : (product.price | number:'1.0-0') }}₫
              </span>
              <span class="price-old" *ngIf="isSaleProduct(product)">
                {{ product.price | number:'1.0-0' }}₫
              </span>
            </div>
            <a [routerLink]="['/chitiet', product._id]" class="add-to-cart-mini" title="Xem chi tiết">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
