<div class="admin-card">
  <div class="section-header">
    <h2>Quản lý khách hàng</h2>
    <div class="header-actions">
      <div class="search-box">
        <input type="text" placeholder="Tìm kiếm khách hàng..." [(ngModel)]="searchQuery" (input)="search()" />
      </div>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Tên khách hàng</th>
          <th>Email</th>
          <th>Số điện thoại</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of displayedUsers; index as i">
          <td>{{ (currentPage - 1) * usersPerPage + i + 1 }}</td>
          <td style="font-weight: 600;">{{ user.name || 'Chưa cập nhật' }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.phone || 'Chưa cập nhật' }}</td>
        </tr>
        <tr *ngIf="displayedUsers.length === 0">
          <td colspan="4" style="text-align: center; padding: 40px; color: #64748b;">Không có người dùng nào.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Phân trang -->
  <div class="pagination" *ngIf="totalPages > 1">
    <button [disabled]="currentPage === 1" (click)="previousPage()" class="pagination-btn">Trước</button>
    <button *ngFor="let page of getPageNumbers()" (click)="goToPage(page)" [class.active]="page === currentPage" class="pagination-btn">{{ page }}</button>
    <button [disabled]="currentPage === totalPages" (click)="nextPage()" class="pagination-btn">Sau</button>
  </div>
</div>
