<div class="chat-layout">
  <!-- Conversation List -->
  <div class="chat-sidebar">
    <div class="chat-sidebar-header">
      <h3>Trò chuyện</h3>
      <div class="search-box">
        <input type="text" placeholder="Tìm người dùng..." [(ngModel)]="searchQuery" />
      </div>
    </div>
    <div class="conversation-list">
      <div *ngFor="let conv of conversations" 
           class="conversation-item" 
           [class.active]="activeUser?._id === conv._id"
           (click)="selectUser(conv)">
        <div class="avatar-container">
          <img [src]="conv.avatar || '/images/avt.png'" alt="avatar" />
          <span class="status-indicator"></span>
        </div>
        <div class="conv-info">
          <div class="conv-name">{{ conv.name || 'Khách hàng ẩn danh' }}</div>
          <div class="conv-last-msg">{{ conv.lastMessage }}</div>
        </div>
        <div class="conv-time">{{ conv.timestamp | date:'HH:mm' }}</div>
      </div>
      <div *ngIf="conversations.length === 0" class="empty-list">
        Chưa có cuộc trò chuyện nào.
      </div>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-main">
    <div *ngIf="activeUser" class="chat-container">
      <div class="chat-header">
        <div class="header-user">
          <img [src]="activeUser.avatar" alt="avatar" />
          <div class="user-details">
            <h4>{{ activeUser.name }}</h4>
            <span>Đang hoạt động</span>
          </div>
        </div>
        <div class="header-actions">
          <button class="action-btn"><i class="icon phone-icon"></i></button>
          <button class="action-btn"><i class="icon more-icon"></i></button>
        </div>
      </div>

      <div class="chat-body" #chatBody>
        <div *ngFor="let msg of messages" 
             class="message-wrapper" 
             [class.sent]="msg.senderRole === 'admin'"
             [class.received]="msg.senderRole !== 'admin'">
          <div class="message-bubble">
            {{ msg.message }}
            <div class="message-time">{{ msg.timestamp | date:'HH:mm' }}</div>
          </div>
        </div>
      </div>

      <div class="chat-footer">
        <input type="text" 
               placeholder="Nhập tin nhắn..." 
               [(ngModel)]="newMessage" 
               (keyup.enter)="sendMessage()" />
        <button class="send-btn" (click)="sendMessage()">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"></path>
          </svg>
        </button>
      </div>
    </div>

    <div *ngIf="!activeUser" class="chat-placeholder">
      <div class="placeholder-content">
        <img src="/images/logo.png" width="80" alt="logo" style="filter: grayscale(1); opacity: 0.2; margin-bottom: 20px;">
        <h3>Chào mừng đến với Deho Chat</h3>
        <p>Chọn một người để bắt đầu trò chuyện</p>
      </div>
    </div>
  </div>
</div>
