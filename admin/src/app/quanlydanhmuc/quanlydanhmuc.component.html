<div class="admin-card">
  <div class="section-header">
    <h2>Quản lý danh mục</h2>
    <div class="header-actions">
      <div class="search-box">
        <input type="text" placeholder="Tìm kiếm danh mục..." [(ngModel)]="searchQuery" (input)="search()" />
      </div>
      <button class="btn-primary" (click)="showAddForm()">
        <span>+</span> Thêm danh mục
      </button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Hình ảnh</th>
          <th>Tên danh mục</th>
          <th>Slug</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let category of displayedCategories; index as i">
          <td>{{ (currentPage - 1) * categoriesPerPage + i + 1 }}</td>
          <td>
            <img *ngIf="category.image" [src]="'http://localhost:4405' + category.image" alt="category image" width="60" style="border-radius: 8px;" />
            <span *ngIf="!category.image" style="color: #64748b; font-size: 12px;">No image</span>
          </td>
          <td style="font-weight: 600;">{{ category.name }}</td>
          <td>{{ category.slug }}</td>
          <td>
            <button class="btn-edit" (click)="showEditForm(category)">Sửa</button>
            <button class="btn-delete" (click)="deleteCategory(category._id!)">Xóa</button>
          </td>
        </tr>
        <tr *ngIf="displayedCategories.length === 0">
          <td colspan="5" style="text-align: center; padding: 40px; color: #64748b;">Không có danh mục nào.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Phân trang -->
  <div class="pagination" *ngIf="totalPages > 1">
    <button [disabled]="currentPage === 1" (click)="previousPage()" class="pagination-btn">Trước</button>
    <button *ngFor="let page of getPageNumbers()" (click)="goToPage(page)" [class.active]="page === currentPage" class="pagination-btn">{{ page }}</button>
    <button [disabled]="currentPage === totalPages" (click)="nextPage()" class="pagination-btn">Sau</button>
  </div>
</div>

<!-- Modal Popup cho Form -->
<div class="modal-overlay" *ngIf="showForm" (click)="closeForm()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ editMode ? 'Cập nhật danh mục' : 'Thêm danh mục mới' }}</h2>
      <button class="close-btn" (click)="closeForm()">×</button>
    </div>
    <form class="admin-form">
      <div class="form-group">
        <label for="name">Tên danh mục</label>
        <input id="name" type="text" [(ngModel)]="currentCategory.name" name="name" required placeholder="Nhập tên danh mục..." />
      </div>
      <div class="form-group">
        <label for="slug">Slug (Đường dẫn)</label>
        <input id="slug" type="text" [(ngModel)]="currentCategory.slug" name="slug" required placeholder="vi-du-danh-muc" />
      </div>
      <div class="form-group">
        <label for="image">Hình ảnh đại diện</label>
        <input id="image" type="file" (change)="onFileChange($event)" accept="image/*" />
        <div class="preview-box" *ngIf="currentCategory.imageUrl">
          <img [src]="currentCategory.imageUrl" alt="preview" width="100" />
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-primary" (click)="saveCategory()">{{ editMode ? 'Cập nhật' : 'Thêm danh mục' }}</button>
        <button type="button" class="btn-secondary" (click)="closeForm()">Hủy bỏ</button>
      </div>
    </form>
  </div>
</div>
