<div class="admin-card">
  <div class="section-header">
    <h2>Quản lý đơn hàng</h2>
    <div class="header-actions">
      <div class="search-box">
        <input type="text" placeholder="Tìm kiếm đơn hàng..." [(ngModel)]="searchQuery" (input)="search()" />
      </div>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Khách hàng</th>
          <th>Tổng tiền</th>
          <th>Trạng thái hiện tại</th>
          <th>Cập nhật trạng thái</th>
          <th>Chi tiết</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let order of filteredOrders; index as i">
          <td>{{ i + 1 }}</td>
          <td style="font-weight: 600;">{{ order.customerName || 'Chưa cập nhật' }}</td>
          <td>{{ order.total | number:'1.0-0' }}₫</td>
          <td>
            <span class="badge-status" [ngClass]="{
              'status-pending': order.status === 'Chờ xác nhận',
              'status-completed': order.status === 'Đã hoàn thành' || order.status === 'Đã giao',
              'status-cancelled': order.status === 'Đã hủy'
            }">
              {{ order.status }}
            </span>
          </td>
          <td>
            <select class="admin-select" (change)="updateOrderStatus(order._id!, $event)" [value]="order.status">
              <option value="Chờ xác nhận">Chờ xác nhận</option>
              <option value="Đang chuẩn bị">Đang chuẩn bị</option>
              <option value="Đang giao">Đang giao</option>
              <option value="Đã giao">Đã giao</option>
              <option value="Đã hủy">Đã hủy</option>
              <option value="Đã hoàn thành">Đã hoàn thành</option>
            </select>
          </td>
          <td>
            <button class="btn-edit" (click)="viewOrderDetails(order._id!)">Xem chi tiết</button>
          </td>
        </tr>
        <tr *ngIf="filteredOrders.length === 0">
          <td colspan="6" style="text-align: center; padding: 40px; color: #64748b;">Không có đơn hàng nào.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
